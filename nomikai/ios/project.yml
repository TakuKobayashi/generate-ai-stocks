name: NomikaiApp
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    DEVELOPMENT_TEAM: "YOUR_TEAM_ID"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_BITCODE: NO
    TARGETED_DEVICE_FAMILY: "1"   # iPhone only
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

configs:
  Debug: debug
  Release: release

targets:
  NomikaiApp:
    type: application
    platform: iOS
    bundleIdSuffix: nomikai
    deploymentTarget: "16.0"

    sources:
      - path: NomikaiApp
        excludes:
          - "**/*.md"

    resources:
      - path: NomikaiApp/Resources
        type: folder

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.nomikai
        INFOPLIST_FILE: NomikaiApp/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: NomikaiApp/Resources/NomikaiApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: ""
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
      debug:
        DEBUG_INFORMATION_FORMAT: dwarf
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      release:
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        SWIFT_OPTIMIZATION_LEVEL: "-O"

    dependencies:
      - sdk: UserNotifications.framework
      - sdk: CoreLocation.framework

    # CocoaPods は pod install 後に xcworkspace 経由でリンクされる
    # GRDB は CocoaPods に含まれる（Podfile 参照）

    # Capabilities
    entitlements:
      path: NomikaiApp/Resources/NomikaiApp.entitlements
      properties:
        com.apple.developer.aps-environment: development
        com.apple.security.app-sandbox: false

    # Build Phases
    prebuildScripts:
      - name: "SwiftLint (Optional)"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
