version: "3.9"

services:
  livekit:
    image: livekit/livekit-server:latest
    command: >
      --config /etc/livekit/livekit.yaml
    network_mode: host
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880/"]
      interval: 10s
      timeout: 5s
      retries: 3
