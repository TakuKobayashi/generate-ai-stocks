# LiveKit サーバー設定（開発用）
# 本番環境では keys / turn / cert を適切に設定すること

port: 7880

# RTC メディア設定
rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: false   # ローカル LAN のみの場合は false
  # LAN の別端末からアクセスする場合はホスト IP を指定:
  # ips:
  #   - 192.168.1.xxx

# 認証キー（開発用 — 本番では必ず変更）
keys:
  devkey: secret

# ロギング
logging:
  json: false
  level: info

# ルーム設定デフォルト値
room:
  empty_timeout: 300          # 参加者0人で 300秒後に自動削除
  max_participants: 20
  enable_remote_unmute: true

# WebHook（必要な場合のみ設定）
# webhook:
#   urls:
#     - http://your-server/webhook
#   api_key: devkey
