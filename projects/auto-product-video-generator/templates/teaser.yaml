meta:
  title: "{{PROJECT_NAME}} Teaser"
  description: "Short teaser for {{PROJECT_NAME}}"
  type: teaser
  duration: 30
  language: ja
  createdAt: "{{CREATED_AT}}"

scenes:
  - id: hook
    title: "フック"
    narration: "あなたの課題を解決します。"
    duration: 5
    actions:
      - type: goto
        url: "{{TARGET_URL}}"
    effects:
      - type: fade_in
        duration: 0.5

  - id: value-prop
    title: "価値提案"
    narration: "{{PROJECT_NAME}}で変わる未来。"
    duration: 12
    actions:
      - type: wait
        ms: 1000
    effects:
      - type: zoom_in
        factor: 1.2
        duration: 1.0

  - id: cta
    title: "CTA"
    narration: "今すぐ試す。"
    duration: 5
    actions:
      - type: screenshot
        name: "cta"
    effects:
      - type: fade_out
        duration: 0.5
