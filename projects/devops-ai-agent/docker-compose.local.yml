# docker-compose.local.yml
# 自前GPUサーバー上での起動構成
#
# 使い方:
#   cp .env.example .env.local
#   docker compose -f docker-compose.local.yml up -d
#
# Ollamaにモデルを追加:
#   docker compose -f docker-compose.local.yml exec ollama ollama pull qwen2.5-coder:32b

services:
  # ─── Ollama (ローカルLLMサーバー) ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU使用 (NVIDIA)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Aiderワーカー (HTTPサーバー) ──────────────────────────────────────────
  aider-worker:
    build:
      context: .
      dockerfile: Dockerfile.local-worker
    container_name: aider-worker
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      OLLAMA_API_BASE: http://ollama:11434/v1  # コンテナ間通信
    depends_on:
      ollama:
        condition: service_healthy

  # ─── Cloudflare Tunnel (外部公開) ─────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --url http://aider-worker:3000
    depends_on:
      - aider-worker

volumes:
  ollama_data:
