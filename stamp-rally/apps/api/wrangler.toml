name = "stamp-rally-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "stamp-rally-db"
database_id = "your-d1-database-id"  # wrangler d1 create stamp-rally-db で取得

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "stamp-rally-assets"

[vars]
ENVIRONMENT = "production"
FRONTEND_URL = "https://stamp-rally.pages.dev"

# JWT_SECRET は wrangler secret put JWT_SECRET で設定
# DKIM_PRIVATE_KEY は wrangler secret put DKIM_PRIVATE_KEY で設定

[[migrations]]
tag = "v1"
new_sqlite_classes = []
